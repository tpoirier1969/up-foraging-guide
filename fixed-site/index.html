<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Upper Michigan Foraging Guide — Clean Import</title>
  <meta name="theme-color" content="#274c3f">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="site-header">
      <div class="brand-block">
        <div>
          <p class="eyebrow">Upper Michigan Foraging Guide</p>
          <h1>Clean species import</h1>
        </div>
        <span class="version-pill" id="versionBadge">v-clean-import-1.0</span>
      </div>
      <nav class="main-nav" id="mainNav" aria-label="Primary"></nav>
    </header>

    <main class="page-root" id="pageRoot" aria-live="polite">
      <section class="panel loading-panel">
        <h2>Loading species</h2>
        <p>Pulling the current species files from your repo and merging them into the clean app.</p>
      </section>
    </main>
  </div>

  <dialog id="detailModal" class="detail-modal">
    <article class="modal-card">
      <button id="closeModalBtn" class="close-btn" type="button" aria-label="Close">×</button>
      <div id="modalContent"></div>
    </article>
  </dialog>

  <script type="module" src="app.js"></script>
</body>
</html>
