<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Upper Michigan Foraging Guide</title>
  <meta name="theme-color" content="#2f5d46">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="UM Forage">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest?v=2026-04-15-2">
  <link rel="stylesheet" href="styles.css?v=v2.0">
  <link rel="stylesheet" href="styles-mainfix4.css?v=v3.1.6">
  <link rel="stylesheet" href="styles-rare-v2.css?v=v3.1.6">
  <style>
    .mushroom-lane-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:.6rem}
    .mushroom-lane-card{display:flex;flex-direction:column;gap:.35rem;padding:.8rem;border:2px solid rgba(0,0,0,.08);border-radius:.8rem;text-decoration:none;color:inherit;background:rgba(255,255,255,.75)}
    .mushroom-lane-card.active{border-color:#2f5d46;box-shadow:0 0 0 2px rgba(47,93,70,.12) inset}
    .rare-card-list{display:grid;grid-template-columns:1fr;gap:.6rem}
    .rare-result-card{display:grid;grid-template-columns:120px minmax(0,1fr);gap:.8rem;align-items:start}
    .rare-thumb{width:120px;height:96px;border-radius:.75rem;background-size:cover;background-position:center;background-repeat:no-repeat;background-color:#e9e4d7;border:1px solid rgba(0,0,0,.08)}
    .rare-thumb.placeholder{display:flex;align-items:center;justify-content:center;font-size:.8rem;color:#666}
    @media (max-width:700px){.rare-result-card{grid-template-columns:1fr}.rare-thumb{width:100%;height:180px}}
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="site-header">
      <div class="brand-wrap">
        <img src="assets/icons/icon-192.png" alt="Upper Michigan Foraging Guide icon" class="brand-icon">
        <div class="brand-content">
          <div class="brand-topline">
            <p class="eyebrow">Upper Michigan Foraging Guide</p>
            <span id="versionBadge" class="version-pill">v3.1.6</span>
          </div>
        </div>
      </div>
      <nav class="main-nav" aria-label="Primary">
        <a href="#/home" data-nav="home">Home</a>
        <a href="#/search" data-nav="search">Search</a>
        <a href="#/plants" data-nav="plants">Plants</a>
        <a href="#/mushrooms" data-nav="mushrooms">Mushrooms</a>
        <a href="#/medicinal" data-nav="medicinal">Medicinal</a>
        <a href="#/rare" data-nav="rare">Rare / Endangered</a>
        <a href="#/timeline" data-nav="timeline">Timeline</a>
        <a href="#/lookalikes" data-nav="lookalikes">Non-edible species</a>
        <a href="#/review" data-nav="review">Needs Review</a>
        <a href="#/references" data-nav="references">References</a>
        <a href="#/credits" data-nav="credits">Credits</a>
      </nav>
    </header>
    <main id="pageRoot" class="page-root" aria-live="polite"></main>
  </div>
  <dialog id="detailModal" class="detail-modal">
    <article class="modal-card">
      <button id="closeModalBtn" class="close-btn" type="button" aria-label="Close">×</button>
      <div id="modalContent"></div>
    </article>
  </dialog>
  <script type="module" src="js/app-mainfix4-masterlist-v2.js?v=v3.1.6"></script>
</body>
</html>
